#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex defaults for spaceship-simulator.
# This stays lean on purpose: no MCP servers are required just to work on the repo.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before edits."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Correctness and regression reviewer focused on code and tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation verifier for CMake, compiler, and dependency questions."
config_file = "agents/docs-researcher.toml"

# Optional MCP examples.
# Uncomment only when the dependency exists in your WSL environment.
