name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcovr lcov ninja-build

      - name: Configure with coverage
        run: |
          cmake -S . -B build -G Ninja \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_FLAGS=--coverage \
            -DCMAKE_CXX_FLAGS=--coverage

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate Codecov coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,inconsistent
          lcov --remove coverage.info '/usr/*' '*/_deps/*' --output-file coverage.info
          lcov --list coverage.info
          test -s coverage.info

      - name: Generate SonarCloud coverage report
        run: |
          gcovr -r . build --sonarqube sonar-coverage.xml
          test -s sonar-coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: coverage.info
          flags: unittests
          token: ${{ env.CODECOV_TOKEN }}
          verbose: true

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        with:
          args: >
            -Dsonar.organization=jzych
            -Dsonar.projectKey=jzych_spaceship-simulator
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/**
            -Dsonar.exclusions=.ignore/**,build/**,docs/**,scripts/**
            -Dsonar.coverage.exclusions=tests/**,src/main.cpp
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.coverageReportPaths=sonar-coverage.xml
            -Dsonar.javascript.file.suffixes=-
            -Dsonar.typescript.file.suffixes=-
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  codex-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Codex PR review
        uses: openai/codex-action@v1
        with:
          github-token: ${{ github.token }}
          openai-api-key: ${{ env.OPENAI_API_KEY }}
